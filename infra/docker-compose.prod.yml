include:
  - path: infra/docker/docker-compose.yml

services:
  backend:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.base
    command: uvicorn backend.api.main:app --host 0.0.0.0 --port 8001 --workers 2
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - START_METRICS=false
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.base
    command: taskiq worker backend.workers.broker:broker backend.workers.tasks
    env_file: .env
    environment:
      - POSTGRES_HOST=postgres
      - REDIS_HOST=redis
      - QDRANT_HOST=qdrant
      - START_METRICS=true
      - METRICS_PORT=9000
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  scheduler:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.base
    command: taskiq scheduler backend.workers.broker:scheduler backend.workers.tasks
    env_file: .env
    environment:
      - REDIS_HOST=redis
      - START_METRICS=true
      - METRICS_PORT=9001
    ports:
      - "9001:9001"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
