global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "seratonin-api"
    static_configs:
      - targets: ["backend:8001"]

  - job_name: "seratonin-worker"
    static_configs:
      - targets: ["worker:9000"]

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
